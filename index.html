<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>• Ayinvox  -  Studio</title>
  <link rel="icon" type="image/png" href="Copielogoayinvoxplusgros.png">

  <!-- =========================================================
       DÉPENDANCES EXTERNES
       ========================================================= -->
  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <!-- Google Fonts : JetBrains Mono + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <!-- =========================================================
       CONFIGURATION TAILWIND
       ========================================================= -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"JetBrains Mono"', 'monospace'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            void:    '#0a0a0a',
            surface: '#111111',
            card:    '#161616',
            border:  '#252525',
            muted:   '#3a3a3a',
            subtle:  '#5a5a5a',
            ghost:   '#888888',
            pale:    '#c0c0c0',
            bright:  '#e8e8e8',
            white:   '#f5f5f5',
          },
          animation: {
            'scan':    'scan 4s linear infinite',
            'blink':   'blink 1.2s step-end infinite',
            'fadeIn':  'fadeIn 0.5s ease forwards',
            'slideUp': 'slideUp 0.5s ease forwards',
          },
          keyframes: {
            scan: {
              '0%':   { transform: 'translateY(-100%)' },
              '100%': { transform: 'translateY(100vh)' },
            },
            blink: {
              '0%, 100%': { opacity: '1' },
              '50%':      { opacity: '0' },
            },
            fadeIn: {
              from: { opacity: '0' },
              to:   { opacity: '1' },
            },
            slideUp: {
              from: { opacity: '0', transform: 'translateY(20px)' },
              to:   { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>

  <!-- =========================================================
       STYLES GLOBAUX
       ========================================================= -->
  <style>
    /* Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background-color: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 2px; }

    /* ─── Sélection de texte ─── */
    ::selection { background: #2a2a2a; color: #f5f5f5; }

    /* ─── Ligne de scan (hero) ─── */
    .scan-line {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 2;
    }
    .scan-line::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(220,220,220,0.08), transparent);
      animation: scan 5s linear infinite;
    }

    /* ─── Grille de fond (hero) ─── */
    .hero-grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ─── Bruit de texture ─── */
    .noise::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ─── Navigation ─── */
    .nav-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888888;
      padding: 6px 0;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
      white-space: nowrap;
    }
    .nav-link:hover  { color: #e8e8e8; border-color: #3a3a3a; }
    .nav-link.active { color: #f5f5f5; border-color: #888888; }

    /* ─── Logo placeholder ─── */
    .logo-mark {
      width: 36px; height: 36px;
      border: 1px solid #3a3a3a;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 700;
      color: #e8e8e8;
      letter-spacing: -0.03em;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }
    .logo-mark:hover { border-color: #888888; }

    /* ─── Balise de classification (préfixe dossier) ─── */
    .tag-class {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #5a5a5a;
      text-transform: uppercase;
    }

    /* ─── Cartes membres ─── */
    .member-card {
      border: 1px solid #252525;
      background: #111111;
      transition: border-color 0.25s ease, transform 0.25s ease;
      position: relative;
    }
    .member-card:hover {
      border-color: #5a5a5a;
      transform: translateY(-2px);
    }
    .member-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 2px; height: 0;
      background: #888888;
      transition: height 0.3s ease;
    }
    .member-card:hover::before { height: 100%; }

    /* ─── Avatar placeholder ─── */
    .avatar-placeholder {
      width: 72px; height: 72px;
      background: #161616;
      border: 1px solid #252525;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ─── Bouton principal ─── */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: #0a0a0a; background: #e8e8e8;
      border: 1px solid #e8e8e8;
      padding: 10px 22px;
      transition: background 0.2s, color 0.2s;
      cursor: pointer; text-decoration: none;
    }
    .btn-primary:hover { background: #f5f5f5; border-color: #f5f5f5; }

    /* ─── Bouton secondaire ─── */
    .btn-outline {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: #888888;
      border: 1px solid #252525;
      padding: 10px 22px;
      transition: color 0.2s, border-color 0.2s;
      cursor: pointer; background: transparent; text-decoration: none;
    }
    .btn-outline:hover { color: #e8e8e8; border-color: #5a5a5a; }

    /* ─── Bloc d'actualité ─── */
    .news-item {
      border-left: 1px solid #252525;
      padding-left: 20px;
      transition: border-color 0.2s;
    }
    .news-item:hover { border-color: #5a5a5a; }

    /* ─── Bloc contact ─── */
    .contact-card {
      border: 1px solid #252525;
      background: #111111;
      transition: border-color 0.25s;
    }
    .contact-card:hover { border-color: #5a5a5a; }

    /* ─── Page de transition (maintenance) ─── */
    .maintenance-gear {
      animation: spin 10s linear infinite;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ─── Section générique ─── */
    .section-divider {
      border: none;
      border-top: 1px solid #1a1a1a;
    }

    /* ─── Clignotement du curseur terminal ─── */
    .cursor-blink::after {
      content: '▌';
      font-family: 'JetBrains Mono', monospace;
      color: #888888;
      animation: blink 1.2s step-end infinite;
    }

    /* ─── Responsive nav mobile ─── */
    @media (max-width: 640px) {
      .nav-link { font-size: 10px; letter-spacing: 0.06em; }
    }
  </style>
</head>

<body class="noise">

  <!-- =========================================================
       HEADER / NAVIGATION
       ========================================================= -->
  <header id="header" class="fixed top-0 left-0 right-0 z-50 bg-void border-b border-border" style="backdrop-filter: blur(8px);">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between gap-6">

      <!-- Logo + Nom -->
      <div class="flex items-center gap-3 flex-shrink-0 cursor-pointer" onclick="showPage('home')">
        <!-- Appel propre de l'image locale du logo à la place du Base64 corrompu -->
        <img src="Copielogoayinvoxplusgros.png" alt="Ayinvox Logo" class="h-8 w-auto object-contain">
      </div>

    </div>
  </header>

</body>
</html>
